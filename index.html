  <title>Kalkulator Pertanian SE 2026</title>

<body>

<div class="container">

  <h1>KALKULATOR PERTANIAN SE 2026</h1>

  <div class="card">
    <label>Luas Lahan (m²)</label>
    <input type="number" id="luas">

    <label>Komoditas</label>
    <select id="komoditas">
      <option value="Padi">Padi</option>
      <option value="Sawi">Sawi</option>
      <option value="Timun">Timun</option>
      <option value="Cabe">Cabe</option>
    </select>

    <button onclick="hitung()">HITUNG</button>
  </div>

  <div id="hasil" class="card"></div>

</div>
